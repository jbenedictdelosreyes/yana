<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Valentines Card</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet"></head><body><div class="envelope"></div><div class="card"><div class="back"></div><div class="front"><div class="heart">❤️</div><div class="f-box"></div></div><div class="text-container"><p class="valentine-text"> Will you be my Valentine? </p></div></div></body><style> .valentine-text { font-family: "Love Ya Like A Sister", cursive; font-weight: 400; font-style: normal; font-size: 36px; text-align: center; color: #ff7ca8; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; -o-user-select: none; user-select: none; } html, body { overflow: hidden; width: 100%; height: 100%; } body { display: flex; margin: auto; background-image: url("hearts.jfif"); background-size: auto; background-repeat: repeat; background-position: 0 0; } .envelope { content: url(envelope.png); width: 430px; position: absolute; left: 18%; top: 3%; filter: drop-shadow(1.5px 0.75px 1.75px #4d4d4d); rotate: -7deg; } .card { position: relative; width: 262px; height: 372px; margin: auto; box-shadow: inset 5px 0px 15px 0px rgba(0, 0, 0, 0.1), 3px 0px 3px -2px rgba(0, 0, 0, 0.3); background-color: #fffffa; transform: scale(1.05); left: 12px; } .front { position: absolute; width: 100%; height: 100%; margin: -10px 0px 0px -10px; margin: auto; border: 1px solid pink; backface-visibility: hidden; background-color: #e8e6e3; background-size: contain; transform-style: preserve-3d; transform-origin: 0% 50%; transform: perspective(800px) rotateY(0deg); transition: all 1s ease-in-out; filter: saturate(1.125) brightness(1.0125); } .card:hover .front, .card.clicked .front { transform: perspective(800px) rotateY(-170deg); background-color: rgb(205, 205, 205); } .card:not(.clicked) .front { transform: perspective(800px) rotateY(0deg); } .card:hover .back, .card.clicked .back { transform: perspective(800px) rotateY(-170deg); box-shadow: 7px 0px 2px 0px rgba(0, 0, 0, 0.3), inset 2px 0px 15px 0px rgba(0, 0, 0, 0.1); background-color: #fffffa; } .card:not(.clicked) .back { transform: perspective(800px) rotateY(0deg); } .heart { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; animation: beat 0.6s infinite; z-index: 10; } @keyframes beat { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.2); } } .back { position: absolute; width: 100%; height: 100%; margin: -10px 0px 0px -10px; margin: auto; backface-visibility: visible; filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.25)); box-shadow: inset 5px 0px 15px 0px rgba(0, 0, 0, 0.1), 3px 0px 3px 1px rgba(0, 0, 0, 0.3); transform-style: preserve-3d; transform-origin: 0% 50%; transform: perspective(800px) rotateY(0deg); transition: all 1s ease-in-out; background-color: #fff; } .text-container { width: 80%; height: 80%; margin: auto; display: flex; justify-content: center; align-items: center; font-family: Roboto; color: #929292; } .f-box { width: 100%; height: 100%; margin: auto; background-color: pink; box-shadow: 0 2px rgba(0, 0, 0, 0.1); text-align: center; } .f-box img { margin-top: 0px; height: 100%; width: auto; } @media (max-width: 675px) { .envelope { width: 380px; } .card { height: 330px; width: 230px; } }</style><script> const card = document.querySelector('.card'); card.addEventListener('click', function (e) { e.stopPropagation(); card.classList.toggle('clicked'); }); card.addEventListener('mouseenter', function () { card.classList.add('clicked'); }); const fbox = document.querySelector('.text-container'); fbox.addEventListener('click', function (e) { e.stopPropagation(); card.classList.remove('clicked'); });</script></html>
