<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cheer up, please</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Grandstander:ital,wght@0,100..900;1,100..900&family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet"><style> body { margin: 0; overflow: hidden; background: #fff; perspective: 1000px; } .parallax { position: absolute; top: 0; left: 0; width: 100%; height: 200%; background: #fff; animation: parallaxMove 60s linear infinite; z-index: 1; } .girl { position: absolute; width: 150px; height: 150px; background: url('walking-girl.gif') no-repeat center/contain; top: -112px; left: calc(50% - 75px); z-index: -1; pointer-events: none; } .message-svg { position: absolute; left: 50%; transform: translateX(-50%); z-index: 4; opacity: 0; user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; } .message-svg.top { top: -220px; animation: popUp 1s ease-out .3s forwards; } .message-svg.bottom { top: 220px; transform: translateX(-50%); animation: popDown 1s ease-in forwards; } .love-ya-like-a-sister-regular { font-family: "Love Ya Like A Sister", cursive; font-weight: 400; font-style: normal; } .grandstander-message { font-family: "Grandstander", cursive; font-optical-sizing: auto; font-weight: 400; font-style: normal; } .earth-container { position: absolute; top: 50vh; left: 50vw; width: 325px; height: 325px; transform-style: preserve-3d; transform: translate(-50%, -50%); z-index: 2; cursor: pointer; user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; } .earth { width: 100%; height: 100%; border-radius: 50%; background: url('planet-earth.png') no-repeat center/cover; animation: spin 20s linear infinite; transform: translate(0, 0); position: relative; overflow: hidden; cursor: pointer; } .smiley { position: absolute; top: 55%; left: 67%; width: 120px; height: 120px; margin: -60px 0 0 -60px; border-radius: 50%; z-index: 3; animation: smileyBounce 4s ease-in-out infinite; pointer-events: none; } .smiley .eye { position: absolute; width: 15px; height: 15px; background: #3a3a3a; border-radius: 5px 5px 0 0; top: 35px; } .smiley .eye.left { left: 30px; animation: blink 3s infinite 6s; } .smiley .eye.right { right: 30px; animation: blink 3s infinite 3s; } .smiley .mouth { position: absolute; width: 60px; height: 30px; border-bottom: 5px solid #3a3a3a; border-radius: 0 0 20px 20px; bottom: 30px; left: 50%; transform: translateX(-50%); } @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } } @keyframes smileyBounce { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -55%) scale(1.05); } } @keyframes spin { from { transform: rotateZ(0deg); } to { transform: rotateZ(360deg); } } @keyframes parallaxMove { from { transform: translateY(0); } to { transform: translateY(-50%); } } .heart { position: absolute; color: #DC143C; font-size: 24px; animation: rain 2s linear forwards; pointer-events: none; z-index: 5; } @keyframes rain { 0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } 100% { opacity: 0; transform: var(--tx) var(--ty) scale(0.3) rotate(360deg); } } @keyframes popUp { 0% { opacity: 0; transform: translateX(-50%) translateY(80px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } } @keyframes popDown { 0% { opacity: 0; transform: translateX(-50%) translateY(-80px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } } </style></head><body><div class="parallax"></div><div class="earth-container"><div id="earth" class="earth"></div><div class="smiley"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="girl"></div><svg class="message-svg top" width="500" height="500" viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg"><defs><path id="arcPathTop" d="M50,250 A175,175 0 0,1 450,250" /></defs><text class="grandstander-message" font-size="30" fill="#DC143C"><textPath href="#arcPathTop" startOffset="50%" text-anchor="middle"> YOU make the world better </textPath></text></svg><svg class="message-svg bottom" width="500" height="500" viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg"><defs><path id="arcPathBottom" d="M50,-100 A175,175 0 0,0 450,-100" /></defs><text class="grandstander-message" font-size="30" fill="#DC143C"><textPath href="#arcPathBottom" startOffset="50%" text-anchor="middle"> just by being in it ❤︎⁠ </textPath></text></svg></div></div><script> document.querySelector('.earth-container').addEventListener('click', function (e) { const container = this; const rect = container.getBoundingClientRect(); const clickX = e.clientX - rect.left; const clickY = e.clientY - rect.top; const clickXPercent = (clickX / rect.width) * 100; const clickYPercent = (clickY / rect.height) * 100; const hearts = Math.random() < 0.5 ? 20 : 30; for (let i = 0; i < hearts; i++) { const heart = document.createElement('span'); heart.className = 'heart'; heart.textContent = '❤︎⁠'; const angle = (Math.random() * Math.PI * 2); const distance = 200 + Math.random() * 200; const tx = Math.cos(angle) * distance; const ty = Math.sin(angle) * distance; const delay = Math.random() * 0.5; heart.style.left = `${clickXPercent}%`; heart.style.top = `${clickYPercent}%`; heart.style.setProperty('--tx', `translateX(${tx}px)`); heart.style.setProperty('--ty', `translateY(${ty}px)`); heart.style.zIndex = '5'; heart.style.animationDelay = `${delay}s`; heart.style.marginLeft = `-12px`; heart.style.marginTop = `-12px`; container.appendChild(heart); setTimeout(() => heart.remove(), 2500); } }); </script></body></html>
